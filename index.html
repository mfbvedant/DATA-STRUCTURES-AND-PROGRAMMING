<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive Mobile Network Tower Optimization — BFS, Max-Heap, Greedy Rebalancing visualization" />
  <title>Mobile Network Tower Optimization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ───────────── HEADER ───────────── -->
  <header id="app-header">
    <h1>Mobile network tower optimization</h1>
    <p class="subtitle">6 towers · 7 users · BFS + Max-Heap + Greedy rebalancing</p>
  </header>

  <!-- ───────────── CANVAS ───────────── -->
  <section id="canvas-section">
    <canvas id="sim-canvas" width="860" height="460"></canvas>
    <div class="legend" id="canvas-legend">
      <span class="legend-item"><span class="dot dot-tower"></span> Tower</span>
      <span class="legend-item"><span class="dot dot-user"></span> User</span>
      <span class="legend-item"><span class="dot dot-signal"></span> Signal link</span>
    </div>
  </section>

  <!-- ───────────── CONTROLS ───────────── -->
  <section id="controls">
    <button id="btn-step" class="ctrl-btn" title="Advance one step">Step ▶</button>
    <button id="btn-auto" class="ctrl-btn" title="Auto-play">Auto ▶▶</button>
    <button id="btn-reset" class="ctrl-btn ctrl-btn--reset" title="Reset simulation">Reset</button>
    <span id="step-counter" class="step-badge">Step 0 / 20</span>
  </section>

  <!-- ───────────── TOWER CARDS ───────────── -->
  <section id="tower-cards"></section>

  <!-- ───────────── EVENT LOG ───────────── -->
  <section id="event-log-section">
    <div id="event-log"></div>
  </section>

  <script src="simulation.js"></script>
</body>
</html>
